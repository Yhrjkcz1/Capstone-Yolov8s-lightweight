nc: 10  
scales:
  s: [0.33, 0.50, 1024]

backbone:
  - [-1, 1, Conv, [64, 3, 2]]                  # 0
  - [-1, 1, Conv, [128, 3, 2]]                 # 1
  - [-1, 3, C2f, [128, True]]                  # 2
  - [-1, 1, Conv, [256, 3, 2]]                 # 3
  - [-1, 6, C2f, [256, True]]                  # 4
  - [-1, 1, Conv, [512, 3, 2]]                 # 5
  - [-1, 1, C2f_SG_ECA, [256, 256, 2, True]]   # 6
  - [-1, 1, Conv, [1024, 3, 2]]                # 7
  - [-1, 1, C2f_SG_ECA, [512, 512, 1, True]]   # 8
  - [-1, 1, SPPF, [1024, 5]]                   # 9

head:
  # --- P5 -> P4 ---
  - [9, 1, Conv, [256, 1, 1]]                  # 10
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 11
  - [[-1, 6], 1, ASFF_2L, [256]]               # 12 
  
  # --- P4 -> P3 ---
  - [12, 1, Conv, [128, 1, 1]]                 # 13
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 14
  - [4, 1, Conv, [128, 1, 1]]                  # 15
  - [[14, 15], 1, ASFF_2L, [128]]              # 16 

  # 第 17 层：P3 检测前的重要增强。
  # 保持 64 不变，但把瓶颈层由 1 增加到 3（或保持 3），强化特征提取
  - [-1, 1, C2f_SG_ECA, [64, 64, 3, True]]     # 17 

  # --- P3 -> P4 ---
  - [17, 1, Conv, [256, 3, 2]]                 # 18 (将 64 升维回 256)
  - [[18, 12], 1, ASFF_2L, [256]]              # 19 
  - [-1, 1, C2f_SG_ECA, [128, 128, 3, True]]   # 20 (输出 scale 后是 128)

  # --- P4 -> P5 ---
  - [20, 1, Conv, [512, 3, 2]]                 # 21 (升维到 512)
  - [9, 1, Conv, [512, 1, 1]]                  # 22
  - [[21, 22], 1, ASFF_2L, [512]]              # 23 
  - [-1, 1, C2f_SG_ECA, [256, 256, 3, True]]   # 24 (输出 scale 后是 256)

  - [[17, 20, 24], 1, Detect, [nc]]            # 25