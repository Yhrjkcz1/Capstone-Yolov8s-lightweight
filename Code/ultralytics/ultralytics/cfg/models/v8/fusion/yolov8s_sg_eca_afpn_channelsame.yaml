# SEA Improved Model - Final Channel Alignment (v7)
nc: 10  
scales:
  # 将 width 设置为 1.0。手动缩小数值以匹配 YOLOv8s 的特征规模
  s: [0.33, 1.0, 1024] 

backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv, [32, 3, 2]]                  # 0 (P1/2)
  - [-1, 1, Conv, [64, 3, 2]]                  # 1 (P2/4)
  - [-1, 3, C2f, [64, True]]                   # 2
  - [-1, 1, Conv, [128, 3, 2]]                 # 3 (P3/8)
  - [-1, 6, C2f, [128, True]]                  # 4
  - [-1, 1, Conv, [256, 3, 2]]                 # 5 (P4/16)
  
  # 第 6 层：输入和输出都设为 256，确保 cv1 接收 256
  - [-1, 1, C2f_SG_ECA, [256, 256, 2, True]]   # 6 (P4 refine)
  - [-1, 1, Conv, [512, 3, 2]]                 # 7 (P5/32)
  - [-1, 1, C2f_SG_ECA, [512, 512, 1, True]]   # 8 (P5 refine)
  - [-1, 1, SPPF, [512, 5]]                    # 9

head:
  # --- P5 -> P4 ---
  - [9, 1, Conv, [256, 1, 1]]                  # 10
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 11
  - [[-1, 6], 1, ASFF_2L, [256]]               # 12 (P4 Fusion) - 接收两个 256
  
  # --- P4 -> P3 ---
  - [12, 1, Conv, [128, 1, 1]]                 # 13
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 14
  - [4, 1, Conv, [128, 1, 1]]                  # 15
  - [[14, 15], 1, ASFF_2L, [128]]              # 16 (P3 Fusion) - 接收两个 128

  # --- P3 refine ---
  # 强制输出 128 以对齐老师，提升召回
  - [-1, 1, C2f_SG_ECA, [128, 128, 1, True]]   # 17 (P3 Output)

  # --- P3 -> P4 ---
  - [17, 1, Conv, [128, 3, 2]]                 # 18
  - [-1, 1, C2f, [128, True]]                  # 19 (P4 Output)

  # --- P4 -> P5 ---
  - [19, 1, Conv, [256, 3, 2]]                 # 20
  - [9, 1, Conv, [256, 1, 1]]                  # 21
  - [-1, 1, C2f, [256, True]]                  # 22 (P5 Output)

  # Detect 层输入：P3(128), P4(128), P5(256)
  - [[17, 19, 22], 1, Detect, [nc]]            # 23