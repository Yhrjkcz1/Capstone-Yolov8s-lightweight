# YOLOv8 IA-C2f (SG + ECA Integration)
# Designed for VisDrone: Lightweight Backbone + Attention Compensation

# =====================
# Parameters
# =====================
nc: 10  # number of classes

scales:
  # [depth, width, max_channels]
  s: [0.33, 0.50, 1024]

# =====================
# Backbone
# Selective Ghost + ECA Integration
# =====================
backbone:
  # [from, repeats, module, args]

  # P1/2
  - [-1, 1, Conv, [64, 3, 2]]                 # 0

  # P2/4 (Low-level features)
  - [-1, 1, Conv, [128, 3, 2]]                # 1
  - [-1, 3, C2f, [128, True]]                 # 2

  # P3/8 (Critical semantic zone for small objects)
  - [-1, 1, Conv, [256, 3, 2]]                # 3
  - [-1, 6, C2f, [256, True]]                 # 4

  # P4/16 (IA-C2f: Selective Ghost + ECA Fusion)
  - [-1, 1, Conv, [512, 3, 2]]                # 5: 输出自动缩放为 256
  - [-1, 1, C2f_SG_ECA, [256, 256, 2, True]]  # 6: 这里改为你的新模块

  # P5/32 (IA-C2f: Selective Ghost + ECA Fusion)
  - [-1, 1, Conv, [1024, 3, 2]]               # 7: 输出自动缩放为 512
  - [-1, 1, C2f_SG_ECA, [512, 512, 1, True]]  # 8: 这里改为你的新模块

  # Spatial Pyramid Pooling
  - [-1, 1, SPPF, [1024, 5]]                  # 9

# =====================
# Head
# Stable Feature Fusion (Standard C2f for reliability)
# =====================
head:
  # P5 -> P4
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 10
  - [[-1, 6], 1, Concat, [1]]                  # 11
  - [-1, 3, C2f, [512]]                        # 12

  # P4 -> P3
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 13
  - [[-1, 4], 1, Concat, [1]]                  # 14
  - [-1, 3, C2f, [256]]                        # 15

  # Downsample P3 -> P4
  - [-1, 1, Conv, [256, 3, 2]]                 # 16
  - [[-1, 12], 1, Concat, [1]]                 # 17
  - [-1, 3, C2f, [512]]                        # 18

  # Downsample P4 -> P5
  - [-1, 1, Conv, [512, 3, 2]]                 # 19
  - [[-1, 9], 1, Concat, [1]]                  # 20
  - [-1, 3, C2f, [1024]]                       # 21

  # Detect - 显式传入类别数解决脚本传参 bug
  - [[15, 18, 21], 1, Detect, [10]]            # 22