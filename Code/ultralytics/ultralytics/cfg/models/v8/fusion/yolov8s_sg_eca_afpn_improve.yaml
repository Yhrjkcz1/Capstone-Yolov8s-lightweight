nc: 10  
scales:
  s: [0.33, 0.50, 1024]

backbone:
  - [-1, 1, Conv, [64, 3, 2]]                  # 0
  - [-1, 1, Conv, [128, 3, 2]]                 # 1
  - [-1, 3, C2f, [128, True]]                  # 2
  - [-1, 1, Conv, [256, 3, 2]]                 # 3
  - [-1, 6, C2f, [256, True]]                  # 4
  - [-1, 1, Conv, [512, 3, 2]]                 # 5
  - [-1, 1, C2f_SG_ECA, [256, 256, 2, True]]   # 6 ✅ 保留（语义开始）
  - [-1, 1, Conv, [1024, 3, 2]]                # 7
  - [-1, 1, C2f_SG_ECA, [512, 512, 1, True]]   # 8 ✅ 最高语义层
  - [-1, 1, SPPF, [1024, 5]]                   # 9

head:
  # --- P5 -> P4 ---
  - [9, 1, Conv, [256, 1, 1]]                  # 10
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 11
  - [[-1, 6], 1, ASFF_2L, [256]]               # 12 ✅ 保留（关键一次）
  
  # --- P4 -> P3 ---
  - [12, 1, Conv, [128, 1, 1]]                 # 13
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 14
  - [4, 1, Conv, [128, 1, 1]]                  # 15
  - [[14, 15], 1, ASFF_2L, [128]]              # 16 ✅ 保留

  # --- P3 refine ---
  # ↓↓↓ 这里是关键改动：减轻 Ghost 强度
  - [-1, 1, C2f_SG_ECA, [64, 64, 1, True]]     # 17 ❗ n: 3 → 1

  # --- P3 -> P4 ---
  - [17, 1, Conv, [256, 3, 2]]                 # 18
  # ❌ 原来的 ASFF_2L 删除，避免过多决策
  - [-1, 1, C2f, [256, True]]                  # 19 ✅ 用普通 C2f 稳定语义

  # --- P4 -> P5 ---
  - [19, 1, Conv, [512, 3, 2]]                 # 20
  - [9, 1, Conv, [512, 1, 1]]                  # 21
  # ❌ 删除 ASFF_2L
  - [-1, 1, C2f, [512, True]]                  # 22 ✅ 稳定输出

  - [[17, 19, 22], 1, Detect, [nc]]            # 23